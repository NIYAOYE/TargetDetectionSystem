<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SAR 目标检测与分析系统</title>
    <link rel="stylesheet" href="/static/styles.css?v=visual-refresh-2" />
  </head>
  <body>
    <svg class="icon-sprite" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" width="0" height="0" style="position:absolute;width:0;height:0;overflow:hidden;">
      <symbol id="icon-chip" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="7" y="7" width="10" height="10" rx="2"></rect>
        <path d="M9 1v4M15 1v4M9 19v4M15 19v4M1 9h4M1 15h4M19 9h4M19 15h4"></path>
      </symbol>
      <symbol id="icon-target" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="8"></circle>
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M12 2v4M12 18v4M2 12h4M18 12h4"></path>
      </symbol>
      <symbol id="icon-folder-up" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 7.5A2.5 2.5 0 0 1 5.5 5H10l2 2h6.5A2.5 2.5 0 0 1 21 9.5v7A2.5 2.5 0 0 1 18.5 19h-13A2.5 2.5 0 0 1 3 16.5z"></path>
        <path d="M12 16V10M9.5 12.5 12 10l2.5 2.5"></path>
      </symbol>
      <symbol id="icon-trash" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 7h16M10 11v6M14 11v6M6 7l1 14h10l1-14M9 7V4h6v3"></path>
      </symbol>
      <symbol id="icon-refresh" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 7v5h-5M4 17v-5h5"></path>
        <path d="M18.5 10A7 7 0 0 0 6.7 6.7L4 9.4M5.5 14a7 7 0 0 0 11.8 3.3L20 14.6"></path>
      </symbol>
      <symbol id="icon-image" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="5" width="18" height="14" rx="2"></rect>
        <circle cx="8.5" cy="10" r="1.5"></circle>
        <path d="m21 16-5-5-4 4-2-2-7 6"></path>
      </symbol>
      <symbol id="icon-crop" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 3v12a3 3 0 0 0 3 3h12M3 6h12a3 3 0 0 1 3 3v12M9 9h6v6H9z"></path>
      </symbol>
      <symbol id="icon-wave" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12c2.5-6 5.5-6 8 0s5.5 6 10 0"></path>
        <path d="M3 17c2.5-3 5.5-3 8 0s5.5 3 10 0"></path>
      </symbol>
      <symbol id="icon-play" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 5v14l11-7z"></path>
      </symbol>
      <symbol id="icon-activity" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12h4l2-7 4 14 2-7h6"></path>
      </symbol>
      <symbol id="icon-edit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 20h4l11-11a2.8 2.8 0 0 0-4-4L4 16z"></path>
        <path d="m13.5 6.5 4 4"></path>
      </symbol>
      <symbol id="icon-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 5v14M5 12h14"></path>
      </symbol>
      <symbol id="icon-x" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="m6 6 12 12M18 6 6 18"></path>
      </symbol>
      <symbol id="icon-export" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3v12M8 7l4-4 4 4"></path>
        <path d="M5 13v6h14v-6"></path>
      </symbol>
      <symbol id="icon-table" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="5" width="18" height="14" rx="2"></rect>
        <path d="M3 10h18M9 5v14M15 5v14"></path>
      </symbol>
      <symbol id="icon-camera" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 8h4l2-3h4l2 3h4v11H4z"></path>
        <circle cx="12" cy="13.5" r="3.5"></circle>
      </symbol>
    </svg>

    <div class="app-shell">
      <header class="app-header">
        <div class="header-brand">
          <div class="radar-icon" aria-hidden="true">
            <div class="radar-ring"></div>
            <div class="radar-ring"></div>
            <div class="radar-ring"></div>
            <div class="radar-axis"></div>
            <div class="radar-sweep"></div>
            <div class="radar-dot"></div>
            <div class="radar-dot"></div>
          </div>
          <div class="brand-copy">
            <div class="header-title">SAR 目标检测与分析系统</div>
            <div class="header-subtitle">Browser Analysis Workstation</div>
          </div>
        </div>
        <div class="header-spacer"></div>
        <div class="header-status">
          <div class="header-status-dot" id="headerDot"></div>
          <div class="header-status-text">SYSTEM ONLINE</div>
        </div>
      </header>

      <aside class="side-column">
        <div class="controls-stack">
          <section class="tech-panel">
            <div class="panel-title">
              <span class="p-accent"></span>
              <svg class="ui-icon" width="16" height="16" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-chip"></use></svg>
              <span>模型加载</span>
            </div>
            <label class="field-label" for="detectorSelect">
              <svg class="field-icon" width="14" height="14" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-target"></use></svg>
              <span>检测模型</span>
            </label>
            <select id="detectorSelect"></select>
            <div class="file-actions">
              <button class="mini-btn mini-upload" data-category="detectors" title="上传检测模型">
                <svg class="btn-icon" width="15" height="15" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-folder-up"></use></svg>
                <span>上传</span>
              </button>
              <button class="mini-btn mini-delete" data-category="detectors" title="删除选中模型">
                <svg class="btn-icon" width="15" height="15" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-trash"></use></svg>
                <span>删除</span>
              </button>
            </div>
            <input type="file" id="detectorFileInput" class="file-input-hidden" data-category="detectors" accept=".pt,.pth" />

            <label class="field-label" for="classifierSelect">
              <svg class="field-icon" width="14" height="14" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-wave"></use></svg>
              <span>RF 分类模型</span>
            </label>
            <select id="classifierSelect"></select>
            <div class="file-actions">
              <button class="mini-btn mini-upload" data-category="classifiers" title="上传分类模型">
                <svg class="btn-icon" width="15" height="15" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-folder-up"></use></svg>
                <span>上传</span>
              </button>
              <button class="mini-btn mini-delete" data-category="classifiers" title="删除选中模型">
                <svg class="btn-icon" width="15" height="15" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-trash"></use></svg>
                <span>删除</span>
              </button>
            </div>
            <input type="file" id="classifierFileInput" class="file-input-hidden" data-category="classifiers" accept=".pkl,.joblib" />

            <button id="refreshFilesBtn" class="tech-button">
              <svg class="btn-icon" width="15" height="15" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-refresh"></use></svg>
              <span>刷新文件列表</span>
            </button>
          </section>

          <section class="tech-panel">
            <div class="panel-title">
              <span class="p-accent"></span>
              <svg class="ui-icon" width="16" height="16" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-image"></use></svg>
              <span>图像与检测</span>
            </div>
            <label class="field-label" for="imageSelect">
              <svg class="field-icon" width="14" height="14" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-camera"></use></svg>
              <span>SAR 图像</span>
            </label>
            <select id="imageSelect"></select>
            <div class="file-actions">
              <button class="mini-btn mini-upload" data-category="images" title="上传 SAR 图像">
                <svg class="btn-icon" width="15" height="15" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-folder-up"></use></svg>
                <span>上传</span>
              </button>
              <button class="mini-btn mini-delete" data-category="images" title="删除选中图像">
                <svg class="btn-icon" width="15" height="15" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-trash"></use></svg>
                <span>删除</span>
              </button>
            </div>
            <input type="file" id="imageFileInput" class="file-input-hidden" data-category="images" accept=".png,.jpg,.jpeg,.tif,.tiff" />

            <label class="field-label" for="patchSizeInput">
              <svg class="field-icon" width="14" height="14" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-crop"></use></svg>
              <span>图像切片大小 (px)</span>
            </label>
            <input id="patchSizeInput" type="number" min="128" max="4096" step="64" value="640" />
            <div id="overlapInfo" class="hint-line">切片重叠固定为 64 px</div>

            <label class="check-row">
              <input id="useRfCheckbox" type="checkbox" />
              <span>启用 RF 分类器</span>
            </label>

            <button id="runDetectionBtn" class="tech-button primary">
              <svg class="btn-icon" width="15" height="15" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-play"></use></svg>
              <span>运行检测</span>
            </button>

            <label class="field-label" for="statusBox">
              <svg class="field-icon" width="14" height="14" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-activity"></use></svg>
              <span>状态信息</span>
            </label>
            <textarea id="statusBox" readonly></textarea>
          </section>

          <section class="tech-panel">
            <div class="panel-title">
              <span class="p-accent"></span>
              <svg class="ui-icon" width="16" height="16" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-edit"></use></svg>
              <span>结果编辑</span>
            </div>
            <div class="button-row">
              <button id="addModeBtn" class="tech-button" disabled>
                <svg class="btn-icon" width="15" height="15" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-plus"></use></svg>
                <span>添加目标</span>
              </button>
              <button id="deleteModeBtn" class="tech-button" disabled>
                <svg class="btn-icon" width="15" height="15" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-x"></use></svg>
                <span>删除目标</span>
              </button>
            </div>
            <button id="exportBtn" class="tech-button primary" disabled>
              <svg class="btn-icon" width="15" height="15" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-export"></use></svg>
              <span>一键导出结果</span>
            </button>
            <div id="exportLinks" class="export-links"></div>
          </section>
        </div>

        <div
          id="leftResizeHandle"
          class="left-resize-handle"
          role="separator"
          aria-orientation="horizontal"
          aria-label="调整左侧上下区域比例"
          tabindex="0"
        ></div>

        <section class="tech-panel results-panel">
          <div class="panel-title">
            <span class="p-accent"></span>
            <svg class="ui-icon" width="16" height="16" viewBox="0 0 24 24" aria-hidden="true"><use href="#icon-table"></use></svg>
            <span>检测结果</span>
          </div>
          <div class="table-wrap">
            <table id="resultsTable">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>类别</th>
                  <th>置信度</th>
                  <th>X</th>
                  <th>Y</th>
                  <th>宽度</th>
                  <th>高度</th>
                  <th>散射点数</th>
                  <th>平均散射强度</th>
                  <th>Hu矩1</th>
                  <th>Hu矩2</th>
                  <th>RF结果</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </section>
      </aside>

      <main class="image-column">
        <section class="tech-panel image-panel">
          <div class="canvas-head">
            <span id="imageTitle">未加载图像</span>
            <span id="zoomLabel">100%</span>
          </div>
          <div class="canvas-wrap">
            <canvas id="imageCanvas"></canvas>
          </div>
        </section>
      </main>

      <footer class="status-bar">
        <div class="status-indicator">
          <span class="status-dot" id="statusDot"></span>
        </div>
        <span id="globalStatus">就绪</span>
        <progress id="jobProgress" value="0" max="100" hidden></progress>
      </footer>
    </div>

    <script src="/static/app.js?v=visual-refresh-3"></script>
  </body>
</html>
